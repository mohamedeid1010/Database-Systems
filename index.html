<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSE 301 - Database Systems Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0c;
      --card-bg: #111115;
      --border: #222228;
      --text: #ffffff;
      --text-dim: #888890;
      --accent-ch2: #e0b56a;
      --accent-ch3: #82b4d6;
      --accent-ch4: #bd9fd8;
    }

    .abu-eid {
      color: var(--accent-ch2);
      font-family: 'Tajawal', sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 0.6rem;
      letter-spacing: 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 600px;
      text-align: center;
    }

    header {
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    p {
      color: var(--text-dim);
      font-size: 1rem;
      font-weight: 400;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 1.8rem;
      color: var(--text);
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 500;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
      background-color: #16161c;
    }

    .btn.ch2:hover {
      border-color: var(--accent-ch2);
      box-shadow: 0 0 15px rgba(224, 181, 106, 0.15);
    }

    .btn.ch3:hover {
      border-color: var(--accent-ch3);
      box-shadow: 0 0 15px rgba(130, 180, 214, 0.15);
    }

    .btn.ch4:hover {
      border-color: var(--accent-ch4);
      box-shadow: 0 0 15px rgba(189, 159, 216, 0.15);
    }

    .ch-label {
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.3rem;
      text-align: left;
    }

    .ch2 .ch-label { color: var(--accent-ch2); }
    .ch3 .ch-label { color: var(--accent-ch3); }
    .ch4 .ch-label { color: var(--accent-ch4); }

    .ch-title {
      font-size: 1.15rem;
      font-weight: 600;
      text-align: left;
    }

    .arrow {
      font-size: 1.2rem;
      transition: transform 0.2s ease;
    }

    .btn:hover .arrow {
      transform: translateX(4px);
    }

    footer {
      margin-top: 4rem;
      color: #44444a;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>CSE 301: Database Systems</h1>
      <div class="abu-eid">ابو عيد بيمسي</div>
      <p style="margin-top: 0.5rem;">Select a chapter to start studying</p>
    </header>

    <div class="menu">
      <a href="ch2.html" class="btn ch2">
        <div>
          <div class="ch-label">Chapter 02</div>
          <div class="ch-title">E-R Model Study Guide</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="ch 3.html" class="btn ch3">
        <div>
          <div class="ch-label">Chapter 03</div>
          <div class="ch-title">EER Model Study Guide</div>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="ch4.html" class="btn ch4">
        <div>
          <div class="ch-label">Chapter 04</div>
          <div class="ch-title">Relational Model & Normalization Study Guide</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </div>

    <footer>
      <span id="footer-text">M.U.S.T. University</span>
      <div id="visitor-count" style="display: none; margin-top: 0.8rem; color: var(--accent-ch2); font-size: 0.85rem; font-weight: 600; font-family: 'IBM Plex Mono', monospace;">
        Visitor Count: <span id="count-val">...</span>
      </div>
    </footer>
  </div>

  <script>
    let clickCount = 0;
    let totalVisits = null;
    let isCounterVisible = false;

    // Increment and fetch visits using JSONP (bypasses CORS and tracking blockers)
    window.handleVisitsCallback = function(response) {
      totalVisits = response.value;
      updateUI();
    };

    const script = document.createElement('script');
    script.src = 'https://abacus.jasoncameron.dev/hit/must_cse301_mohamed/visits?callback=handleVisitsCallback';
    script.onerror = function() {
      totalVisits = "Unavailable";
      updateUI();
    };
    document.body.appendChild(script);

    function showCount() {
      isCounterVisible = true;
      const countEl = document.getElementById('visitor-count');
      if (countEl) {
        countEl.style.display = 'block';
      }
      updateUI();
    }

    function updateUI() {
      if (!isCounterVisible) return;
      const valEl = document.getElementById('count-val');
      if (valEl) {
        valEl.innerText = totalVisits !== null ? totalVisits : "Loading...";
      }
    }

    // Secret: Click "abu-eid" text 3 times to reveal counter
    const abuEidText = document.querySelector('.abu-eid');
    if (abuEidText) {
      abuEidText.addEventListener('click', () => {
        clickCount++;
        if (clickCount >= 3) {
          showCount();
        }
      });
    }

    // Check query param immediately on load
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('admin') === 'true') {
      showCount();
    }
  </script>
</body>
</html>
